<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A73E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34A853;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FBBC04;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EA4335;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)" />

  <!-- Arabic letter "أ" stylized as HTTP/network symbol -->
  <!-- Network nodes -->
  <circle cx="256" cy="160" r="32" fill="white" opacity="0.95"/>
  <circle cx="160" cy="320" r="28" fill="white" opacity="0.85"/>
  <circle cx="352" cy="320" r="28" fill="white" opacity="0.85"/>

  <!-- Connection lines -->
  <line x1="256" y1="160" x2="160" y2="320" stroke="white" stroke-width="8" opacity="0.7"/>
  <line x1="256" y1="160" x2="352" y2="320" stroke="white" stroke-width="8" opacity="0.7"/>
  <line x1="160" y1="320" x2="352" y2="320" stroke="white" stroke-width="6" opacity="0.5" stroke-dasharray="12,8"/>

  <!-- HTTP brackets -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">{ }</text>

  <!-- Accent dot -->
  <circle cx="256" cy="256" r="16" fill="url(#accent)"/>

  <!-- Arabic text at top -->
  <text x="256" y="80" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle" opacity="0.8">HTTP</text>
</svg>
