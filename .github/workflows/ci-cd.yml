name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

env:
  FLUTTER_VERSION: '3.16.0'

jobs:
  # ============================================================================
  # Analyze and Test
  # ============================================================================
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run unit tests
        run: flutter test test/unit/ --coverage --reporter expanded

      - name: Run widget tests
        run: flutter test test/widget/ --coverage --reporter expanded

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            test/

  # ============================================================================
  # Build Android
  # ============================================================================
  build-android-debug:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Debug APK
        run: flutter build apk --debug --split-per-abi

      - name: Upload Debug APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

  build-android-release:
    name: Build Android Release APK
    runs-on: ubuntu-latest
    needs: [analyze, test]
    # Only build release on tags or main branch
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Release APK
        run: flutter build apk --release --split-per-abi

      - name: Upload Release APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 90

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload App Bundle Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: build/app/outputs/bundle/release/*.aab
          retention-days: 90

  # ============================================================================
  # Build iOS (macOS only)
  # ============================================================================
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: [analyze, test]
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/Runner.app
          retention-days: 30

  # ============================================================================
  # Release
  # ============================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-android-debug, build-android-release, build-ios]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            # Arabic HTTP Studio ${{ github.ref_name }}

            ## 🎉 إصدار جديد!

            ### 📦 التنزيلات

            - **Android APK (Debug)**: متاح في Artifacts
            - **Android APK (Release)**: متاح في Artifacts
            - **Android App Bundle**: متاح في Artifacts
            - **iOS App**: متاح في Artifacts

            ### 📝 ملاحظات الإصدار

            - دعم كامل للغة العربية RTL
            - جميع طرق HTTP (GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS)
            - مصادقة متعددة (Bearer, Basic, Digest, API Key, JWT, Custom)
            - WebSocket كامل مع إعادة الاتصال التلقائي
            - SSE (Server-Sent Events)
            - HTTP/1.1, HTTP/2, HTTP/3
            - TLS مع الشهادات المخصصة
            - Proxy (HTTP, SOCKS5)
            - توليد الكود لـ 12 لغة برمجة
            - استيراد وتصدير (JSON, YAML, CSV, TXT, ZIP)
            - المجموعات والمفضلة والمتغيرات
            - الوضع الليلي والنهاري
          draft: false
          prerelease: false
          files: |
            artifacts/android-debug-apk/*.apk
            artifacts/android-release-apk/*.apk

  # ============================================================================
  # Notification
  # ============================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [analyze, test, build-android-debug]
    if: always()
    steps:
      - name: Check status
        run: |
          echo "Analyze status: ${{ needs.analyze.result }}"
          echo "Test status: ${{ needs.test.result }}"
          echo "Build Android Debug status: ${{ needs.build-android-debug.result }}"

      - name: Success notification
        if: success()
        run: echo "✅ Pipeline completed successfully!"

      - name: Failure notification
        if: failure()
        run: echo "❌ Pipeline failed. Please check the logs."
