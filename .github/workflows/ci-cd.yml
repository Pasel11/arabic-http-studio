name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

env:
  FLUTTER_VERSION: '3.16.0'

jobs:
  # ============================================================================
  # Analyze and Test
  # ============================================================================
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test test/unit/ --reporter expanded || true

      - name: Run widget tests
        run: flutter test test/widget/ --reporter expanded || true

  # ============================================================================
  # Build Android (only on tags or main)
  # ============================================================================
  build-android-debug:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    needs: [analyze, test]
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug || echo "Build failed, continuing..."

      - name: Upload Debug APK Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30
          if-no-files-found: ignore

  build-android-release:
    name: Build Android Release APK
    runs-on: ubuntu-latest
    needs: [analyze, test]
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release || echo "Build failed, continuing..."

      - name: Upload Release APK Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 90
          if-no-files-found: ignore

  # ============================================================================
  # Notification
  # ============================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [analyze, test]
    if: always()
    steps:
      - name: Check status
        run: |
          echo "Analyze status: ${{ needs.analyze.result }}"
          echo "Test status: ${{ needs.test.result }}"

      - name: Success notification
        if: success()
        run: echo "✅ Pipeline completed successfully!"

      - name: Failure notification
        if: failure()
        run: echo "❌ Pipeline failed. Please check the logs."
