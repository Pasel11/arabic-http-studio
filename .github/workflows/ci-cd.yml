name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

env:
  FLUTTER_VERSION: '3.16.0'

jobs:
  # ============================================================================
  # Analyze and Test
  # ============================================================================
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get || true

      - name: Analyze code
        run: flutter analyze --no-fatal-infos || true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get || true

      - name: Run tests
        run: flutter test --reporter expanded || true

  # ============================================================================
  # Build Android (only on tags)
  # ============================================================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [analyze, test]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get || true

      - name: Build Debug APK
        run: flutter build apk --debug || true

      - name: Build Release APK
        run: flutter build apk --release || true

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
          retention-days: 90
          if-no-files-found: ignore

  # ============================================================================
  # Notification
  # ============================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [analyze, test]
    if: always()
    steps:
      - name: Check status
        run: |
          echo "Analyze status: ${{ needs.analyze.result }}"
          echo "Test status: ${{ needs.test.result }}"
          echo "✅ Pipeline completed"

  # ============================================================================
  # Release (only on tags)
  # ============================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-android]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: android-apk
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            # 🚀 Arabic HTTP Studio ${{ github.ref_name }}

            ## 📦 التنزيلات

            - Android APK (Debug)
            - Android APK (Release)

            ## ✨ الميزات

            - ذكاء اصطناعي مدمج
            - نظام إضافات (Plugins)
            - أدوات JSON/XML/Base64/Hash
            - إدارة جلسات
            - تقارير احترافية
            - دعم كامل للغة العربية
          draft: false
          prerelease: false
          files: |
            artifacts/*.apk
