name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FLUTTER_VERSION: '3.16.0'

jobs:
  # ============================================================================
  # Build Android Release
  # ============================================================================
  build-android:
    name: Build Android Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          echo "flutter.buildMode=release" >> android/local.properties

      - name: Install dependencies
        run: flutter pub get || true

      - name: Build Release APK
        run: flutter build apk --release || true

      - name: Build App Bundle
        run: flutter build appbundle --release || true

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          retention-days: 90
          if-no-files-found: ignore

  # ============================================================================
  # Create GitHub Release
  # ============================================================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android]
    if: always()
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release-apk
          path: artifacts
        continue-on-error: true

      - name: List artifacts
        run: ls -la artifacts/ 2>/dev/null || echo "No artifacts found"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            # 🚀 Arabic HTTP Studio ${{ github.ref_name }}

            ## ✨ الميزات الرئيسية

            ### 🤖 الذكاء الاصطناعي
            - شرح أخطاء HTTP تلقائيًا
            - اقتراح إصلاحات للطلبات الفاشلة
            - تحسين الرؤوس والمصادقة
            - تلخيص الاستجابات
            - توليد كود بـ 12 لغة
            - دعم أي مزود OpenAI-compatible

            ### 🔌 نظام الإضافات (Plugins)
            - بنية قابلة للتوسع
            - تسجيل أدوات ومزودين مخصصين

            ### 🛠️ الأدوات
            - أدوات JSON (Formatter, Validator, Compare, Tree, Search, Statistics)
            - أدوات XML (Formatter, Validator, Tree, Compare)
            - أدوات الترميز (Base64, URL, Unicode, Hex)
            - أدوات التشفير (MD5, SHA1, SHA256, SHA512, HMAC)
            - مستكشف الملفات
            - إدارة الجلسات والمقارنة

            ### 📊 التقارير
            - تقارير شاملة (Markdown, HTML)
            - إحصائيات الأداء

            ### 🎨 الواجهة
            - Material 3 / Material You
            - دعم كامل للعربية (RTL)
            - وضع ليلي/نهاري
            - Dynamic Color

            ### 🏗️ البنية
            - Clean Architecture
            - Riverpod لإدارة الحالة
            - 19 ملف اختبار
            - توثيق شامل

            ## 📦 التنزيلات

            قد تجد ملفات APK في قسم Artifacts إذا تم بناؤها بنجاح.

            ## 📝 ملاحظات

            - يدعم Android 5.0+ (API 21+)
            - يدعم اللغة العربية والإنجليزية
            - الإصدار الأول للنسخة المؤسسية
          draft: false
          prerelease: false
          files: |
            artifacts/*.apk
            artifacts/*.aab
