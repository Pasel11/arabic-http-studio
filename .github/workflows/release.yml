name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FLUTTER_VERSION: '3.16.0'

jobs:
  # ============================================================================
  # Build Android Release
  # ============================================================================
  build-android:
    name: Build Android Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release --split-per-abi

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 90

      - name: Upload AAB Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: build/app/outputs/bundle/release/*.aab
          retention-days: 90

  # ============================================================================
  # Build iOS Release
  # ============================================================================
  build-ios:
    name: Build iOS Release
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: build/ios/iphoneos/Runner.app
          retention-days: 30

  # ============================================================================
  # Create GitHub Release
  # ============================================================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            # 🚀 Arabic HTTP Studio ${{ github.ref_name }}

            ## 📦 التنزيلات

            - **Android APK (arm64-v8a)**: `app-arm64-v8a-release.apk`
            - **Android APK (armeabi-v7a)**: `app-armeabi-v7a-release.apk`
            - **Android APK (x86_64)**: `app-x86_64-release.apk`
            - **Android App Bundle**: `app-release.aab`
            - **iOS App**: `Runner.app`

            ## ✨ الميزات الجديدة

            - محرر كود احترافي مع إبراز الصيغة
            - إدارة مشاريع متقدمة (Workspace, Project, Folder)
            - شاشة أدوات المطور
            - تصدير إلى OpenAPI, Swagger, Postman
            - استيراد من OpenAPI, Swagger, Postman
            - نسخ احتياطي واستعادة
            - تحسينات الأداء والذاكرة

            ## 🐛 إصلاحات الأخطاء

            - إصلاحات متعددة للأداء والاستقرار

            ## 📝 ملاحظات

            - يدعم Android 5.0+ (API 21+)
            - يدعم iOS 12.0+
            - يدعم اللغة العربية والإنجليزية

            ---
            [التغييرات الكاملة](https://github.com/your-username/arabic-http-studio/blob/main/CHANGELOG.md)
          draft: false
          prerelease: false
          files: |
            artifacts/android-release-apk/*.apk
            artifacts/android-release-aab/*.aab

  # ============================================================================
  # Notify
  # ============================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [release]
    if: always()
    steps:
      - name: Success
        if: success()
        run: |
          echo "✅ Release ${{ github.ref_name }} published successfully!"

      - name: Failure
        if: failure()
        run: |
          echo "❌ Release ${{ github.ref_name }} failed!"
