name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FLUTTER_VERSION: '3.16.0'

jobs:
  build-android:
    name: Build Android Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          echo "flutter.buildMode=release" >> android/local.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 90
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android]
    if: always()
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release-apk
          path: artifacts
        continue-on-error: true

      - name: List artifacts
        run: ls -la artifacts/ 2>/dev/null || echo "No artifacts"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            # 🚀 Arabic HTTP Studio ${{ github.ref_name }}

            ## ✨ الميزات

            - 🤖 ذكاء اصطناعي مدمج (OpenAI-compatible)
            - 🔌 نظام إضافات (Plugins)
            - 🛠️ أدوات JSON/XML/Base64/Hash
            - 📋 إدارة جلسات ومقارنة
            - 📊 تقارير احترافية
            - 🎨 Material 3 مع دعم كامل للعربية RTL
            - 🏗️ Clean Architecture مع Riverpod

            ## 📦 التنزيلات

            حمّل ملف APK من قسم Assets أدناه.

            ## 📝 ملاحظات

            - يدعم Android 5.0+ (API 21+)
            - يدعم اللغة العربية والإنجليزية
          draft: false
          prerelease: false
          files: |
            artifacts/*.apk
