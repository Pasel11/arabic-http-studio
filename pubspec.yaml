name: arabic_http_studio
description: Arabic HTTP Request Studio - استوديو احترافي لإرسال طلبات HTTP و WebSocket مع دعم كامل للغة العربية والذكاء الاصطناعي.
publish_to: 'none'
version: 2.0.0+20

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Routing
  go_router: ^13.0.0

  # Network
  dio: ^5.4.0
  dio_cookie_manager: ^3.1.1
  dio_http2_adapter: ^2.5.0
  web_socket_channel: ^2.4.0
  cookie_jar: ^4.0.8
  http_parser: ^4.0.2

  # Database & Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  # UI & Utils
  cupertino_icons: ^1.0.6
  google_fonts: ^5.0.0
  xml: ^6.5.0
  flutter_markdown: ^0.6.19

  # Crypto & Encoding
  crypto: ^3.0.3
  encrypt: ^5.0.3

  # Utils
  uuid: ^4.2.1
  intl: ^0.18.1
  path: ^1.8.3

  # Export
  archive: ^3.4.9
  yaml: ^3.1.2
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/images/

  # Note: Add font files manually to assets/fonts/
  # Download Cairo and Tajawal from Google Fonts
  # fonts:
  #   - family: Cairo
  #     fonts:
  #       - asset: assets/fonts/Cairo-Regular.ttf
  #       - asset: assets/fonts/Cairo-Bold.ttf
  #         weight: 700
  #   - family: Tajawal
  #     fonts:
  #       - asset: assets/fonts/Tajawal-Regular.ttf
  #       - asset: assets/fonts/Tajawal-Bold.ttf
  #         weight: 700
